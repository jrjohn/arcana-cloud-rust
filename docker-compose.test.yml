services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.ci
      target: builder
    working_dir: /app
    # No trailing `|| true`: the Unit Tests Jenkins stage is now a blocking gate, so a
    # non-zero cargo exit must propagate out of `docker compose run`. --no-fail-fast
    # still runs every test (so all failures are reported) before returning non-zero.
    command: ["sh", "-c", "cargo test --workspace --no-fail-fast 2>&1"]

  coverage:
    # ARM64-native: cargo-llvm-cov (tarpaulin is x86_64 only)
    build:
      context: .
      dockerfile: Dockerfile.coverage
    working_dir: /app
    volumes:
      - ./coverage:/output
    # Use --lib to skip database integration tests that require a live DB
    command:
      - sh
      - -c
      - |
        cargo llvm-cov --lib --workspace --no-fail-fast \
          --lcov --output-path /output/lcov.info \
          --ignore-filename-regex 'generated|proto|target' \
          2>&1 || true
