# Arcana Cloud Rust — Kind CI Integration Test Manifest (3-Layer gRPC)
#
# Architecture:
#   Client -> Controller (REST :8080, NodePort 30094)
#          -> Service    (gRPC :9090)
#          -> Repository (gRPC :9090)
#          -> MySQL      (:3306)
#          -> Redis      (:6379)
#
# Usage:
#   kind create cluster --name arcana-ci
#   kind load docker-image arcana-cloud-rust:ci --name arcana-ci
#   kubectl apply -f deployment/kubernetes/ci/kind-ci-grpc.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: arcana-ci-kind-rust

---
# ─── MySQL ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: arcana-ci-kind-rust
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "ci_root"
            - name: MYSQL_DATABASE
              value: "arcana_cloud"
            - name: MYSQL_USER
              value: "arcana"
            - name: MYSQL_PASSWORD
              value: "ci_arcana"
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "arcana", "-pci_arcana"]
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-u", "arcana", "-pci_arcana"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: arcana-ci-kind-rust
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# ─── Redis ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: arcana-ci-kind-rust
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: arcana-ci-kind-rust
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ─── Repository Layer (gRPC :9090) ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-ci-repository
  namespace: arcana-ci-kind-rust
  labels:
    app: arcana-ci-repository
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-ci-repository
  template:
    metadata:
      labels:
        app: arcana-ci-repository
    spec:
      containers:
        - name: repository
          image: arcana-cloud-rust:ci
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: ARCANA__APP__ENVIRONMENT
              value: "ci"
            - name: ARCANA__DEPLOYMENT__MODE
              value: "layeredgrpc"
            - name: ARCANA__DEPLOYMENT__LAYER
              value: "repository"
            - name: ARCANA__SERVER__GRPC_HOST
              value: "0.0.0.0"
            - name: ARCANA__SERVER__GRPC_PORT
              value: "9090"
            - name: ARCANA__DATABASE__URL
              value: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
            - name: ARCANA__REDIS__URL
              value: "redis://redis:6379"
            - name: ARCANA__SECURITY__JWT_SECRET
              value: "ci-secret-key-minimum-32-characters-for-testing"
            - name: ARCANA__SECURITY__JWT_ISSUER
              value: "arcana-cloud"
            - name: ARCANA__SECURITY__JWT_AUDIENCE
              value: "arcana-api"
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: arcana-ci-repository
  namespace: arcana-ci-kind-rust
spec:
  selector:
    app: arcana-ci-repository
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP

---
# ─── Service Layer (gRPC :9090) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-ci-service
  namespace: arcana-ci-kind-rust
  labels:
    app: arcana-ci-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-ci-service
  template:
    metadata:
      labels:
        app: arcana-ci-service
    spec:
      containers:
        - name: service
          image: arcana-cloud-rust:ci
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: ARCANA__APP__ENVIRONMENT
              value: "ci"
            - name: ARCANA__DEPLOYMENT__MODE
              value: "layeredgrpc"
            - name: ARCANA__DEPLOYMENT__LAYER
              value: "service"
            - name: ARCANA__SERVER__GRPC_HOST
              value: "0.0.0.0"
            - name: ARCANA__SERVER__GRPC_PORT
              value: "9090"
            - name: ARCANA__DATABASE__URL
              value: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
            - name: ARCANA__REDIS__URL
              value: "redis://redis:6379"
            - name: ARCANA__SECURITY__JWT_SECRET
              value: "ci-secret-key-minimum-32-characters-for-testing"
            - name: ARCANA__SECURITY__JWT_ISSUER
              value: "arcana-cloud"
            - name: ARCANA__SECURITY__JWT_AUDIENCE
              value: "arcana-api"
            - name: ARCANA__DEPLOYMENT__REPOSITORY_URL
              value: "http://arcana-ci-repository:9090"
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: arcana-ci-service
  namespace: arcana-ci-kind-rust
spec:
  selector:
    app: arcana-ci-service
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP

---
# ─── Controller Layer (REST :8080, NodePort 30094) ────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcana-ci-controller
  namespace: arcana-ci-kind-rust
  labels:
    app: arcana-ci-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arcana-ci-controller
  template:
    metadata:
      labels:
        app: arcana-ci-controller
    spec:
      containers:
        - name: controller
          image: arcana-cloud-rust:ci
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ARCANA__APP__ENVIRONMENT
              value: "ci"
            - name: ARCANA__DEPLOYMENT__MODE
              value: "layeredgrpc"
            - name: ARCANA__DEPLOYMENT__LAYER
              value: "controller"
            - name: ARCANA__SERVER__REST_HOST
              value: "0.0.0.0"
            - name: ARCANA__SERVER__REST_PORT
              value: "8080"
            - name: ARCANA__DATABASE__URL
              value: "mysql://arcana:ci_arcana@mysql:3306/arcana_cloud"
            - name: ARCANA__REDIS__URL
              value: "redis://redis:6379"
            - name: ARCANA__SECURITY__JWT_SECRET
              value: "ci-secret-key-minimum-32-characters-for-testing"
            - name: ARCANA__SECURITY__JWT_ISSUER
              value: "arcana-cloud"
            - name: ARCANA__SECURITY__JWT_AUDIENCE
              value: "arcana-api"
            - name: ARCANA__DEPLOYMENT__SERVICE_URL
              value: "http://arcana-ci-service:9090"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: arcana-ci-controller
  namespace: arcana-ci-kind-rust
spec:
  type: NodePort
  selector:
    app: arcana-ci-controller
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30094
      protocol: TCP
